m0_intro:"事業策略 (Business Strategy) 探討如何競爭；而集團策略 (Corporate Strategy) 則探討在哪裡競爭——定義企業的邊界。本模組將透過交易成本經濟學 (TCE) 探討企業為何存在，並分析垂直整合的利益與成本、專屬性資產的套牢風險，以及外包與虛擬企業等現代供應鏈重組趨勢。",

m1_nav:"1. 邊界與交易成本",m1_title:"公司邊界與交易成本",
m1_p1:"在探討競爭優勢時，我們關注的是事業策略 (Business Strategy)。但當視野放大到「企業應該參與哪些活動」時，這便屬於集團策略 (Corporate Strategy) 的範疇。集團策略決定了企業的範圍：產品範圍 (多元化)、地理範圍 (國際化) 與垂直範圍 (垂直整合)。",
m1_p2:"「如果市場的價格機制能完美協調資源，那麼企業為什麼會存在？」—— Ronald Coase (1937)",
m1_p3:"諾貝爾經濟學獎得主 Ronald Coase 提出了「交易成本經濟學」(Transaction Cost Economics, TCE)。他指出，利用市場機制並非免費，尋找供應商、談判、擬定合約、監督與執行合約都需要成本（即交易成本）。",
m1_p4:"企業作為一種組織，是市場機制的替代品。當透過市場交易的成本（市場的「看不見的手」）大於在企業內部建立行政層級來協調的成本（管理者的「看得見的手」）時，企業就會選擇將該活動內部化，企業的邊界因此擴張。",
m1_cards:[
  {title:"市場的交易成本",desc:"透過市場購買的隱含成本：搜尋成本、談判成本、合約擬定成本、監督與執行合約的成本，以及合約不完全帶來的風險。"},
  {title:"企業的行政成本",desc:"將活動內部化的隱含成本：建立管理層級的成本、部門間協調成本、官僚化導致的遲鈍，以及缺乏市場競爭帶來的誘因不足。"},
  {title:"Coase 的黃金法則",desc:"企業的邊界將停留在：在企業內部組織最後一筆交易的行政成本，剛好等於在公開市場進行同一筆交易的交易成本。"},
  {title:"資訊科技的影響",desc:"網際網路與 B2B 平台大幅降低了市場搜尋與交易成本，導致近年來企業邊界普遍縮小，外包 (Outsourcing) 成為主流。"}
],
m1_terms:[

  {front:"Transaction Costs\n交易成本",back:"使用市場價格機制進行交易所產生的摩擦成本，包含搜尋、談判、締約與監督的成本。"},
  {front:"Administrative Costs\n行政成本",back:"在企業內部透過管理層級與命令系統來協調經濟活動所產生的組織與管理成本。"}
],
m1_q:[
  {q:"集團策略 (Corporate Strategy) 與事業策略 (Business Strategy) 的主要區別為何？",opts:["前者探討在哪裡競爭，後者探討如何競爭","前者專注於單一產品，後者專注於多項產品","前者屬於中階主管職責，後者屬於高階主管職責","兩者完全相同"],ans:0,exp:"集團策略決定企業的邊界(Where to compete)；事業策略決定在既定市場內建立競爭優勢(How to compete)。"},
  {q:"Ronald Coase 提出企業存在的主要原因是什麼？",opts:["為了追求最大利潤","因為使用市場機制是有成本的（交易成本）","政府法規的要求","為了創造就業機會"],ans:1,exp:"Coase 指出市場交易存在摩擦成本，當內部行政協調成本低於市場交易成本時，企業便會存在並擴張邊界。"},
  {q:"下列何者屬於「市場的交易成本」？",opts:["建立人力資源部門的費用","中階主管的薪資","尋找適合供應商與談判合約的成本","公司內部的會議時間"],ans:2,exp:"尋找、談判、締約與監督外部供應商的成本即為市場的交易成本。"},
  {q:"網際網路與電子商務的普及對企業邊界產生了什麼影響？",opts:["使企業邊界無限擴張","大幅降低交易成本，促使企業邊界縮小（增加外包）","對企業邊界沒有影響","導致企業完全消失"],ans:1,exp:"科技降低了尋找與監督外部供應商的交易成本，使得市場購買比內部製造更具吸引力，推動了外包浪潮。"},
  {q:"企業擴張邊界（如垂直整合）會增加哪一種成本？",opts:["交易成本","行政成本與官僚成本","原物料成本","行銷成本"],ans:1,exp:"內部化活動需要建立新的管理層級來協調，這會增加企業整體的行政與官僚成本。"},
  {q:"決定企業最適邊界的「Coase 邊界法則」是什麼？",opts:["邊際交易成本 = 邊際行政成本","總收益 = 總成本","市場份額最大化","內部員工人數極大化"],ans:0,exp:"當內部化最後一筆交易的行政成本等於在市場進行該交易的成本時，企業邊界達到最適。"},
  {q:"何種情況下，企業傾向將某項活動「外包」(Buy) 而非內部製造 (Make)？",opts:["該活動的交易成本極高","市場上有多家競爭激烈的優秀供應商，且交易成本低","該活動需要高度保密的專利技術","該活動的內部行政成本極低"],ans:1,exp:"當市場競爭激烈且交易成本低時，透過市場購買能享受供應商的規模經濟與價格競爭，勝過內部製造。"},
  {q:"「看不見的手」與「看得見的手」分別代表什麼協調機制？",opts:["政府與市場","市場價格機制與企業內部行政指令","員工與主管","股東與 CEO"],ans:1,exp:"Adam Smith 的「看不見的手」代表市場價格機制；Alfred Chandler 的「看得見的手」代表企業內部的管理層級指令。"}
],

m2_nav:"2. 利益與成本",m2_title:"垂直整合的利益與成本",
m2_p1:"垂直整合 (Vertical Integration) 是企業將其價值鏈的相鄰階段內部化。向原物料端整合稱為「向後整合」(Backward Integration)；向最終消費者端整合稱為「向前整合」(Forward Integration)。企業選擇垂直整合通常是為了獲得特定利益，但也必須承擔相應成本。",
m2_p2:"垂直整合的利益之一是「技術經濟性」(Technical Economies)。例如在鋼鐵業，將煉鐵與軋鋼設在同一廠區（共地生產, Co-location），可省去重新加熱鋼胚的能源成本。然而，技術經濟性只需「比鄰而居」即可，不一定需要「同一家公司」擁有。",
m2_p3:"驅動垂直整合最關鍵的理論是 Oliver Williamson 的「套牢問題」(Hold-up Problem)。當交易雙方需要投入「專屬性資產」(Transaction-specific assets) 時，雙方會陷入相互依賴。若合約不完全，一方可能利用對方的依賴進行敲詐（例如提高價格）。為了避免這種交易風險，企業乾脆將交易對手買下來，實現垂直整合。",
m2_p4:"然而，垂直整合的成本極高：(1) 失去市場機制的「高強度誘因」(High-powered incentives)，內部部門缺乏競爭壓力導致效率低落；(2) 最適規模差異 (Differences in optimal scale)，例如汽車廠內部生產雨刷的規模可能未達雨刷廠的最低效率規模；(3) 喪失策略彈性 (Loss of flexibility)，在技術快速變遷時，整合型企業難以迅速更換供應商；(4) 風險複合 (Compounding of risk)，單一環節罷工可能導致全線停擺。",
m2_cards:[
  {title:"套牢問題 (Hold-up)",desc:"發生於專屬性資產投資（如專為特定客戶設計的模具或設在礦場旁的發電廠）。一旦投資，資產難以轉作他用，投資方容易被交易對手勒索剝削。"},
  {title:"最適規模差異",desc:"Federal Express 需要送貨車，但絕不會自己製造車輛。因為貨車製造的最低效率規模（每年幾十萬輛）遠遠大於 FedEx 的內部需求，內部製造將導致極高成本。"},
  {title:"Zara 的垂直整合",desc:"Zara 將設計、部分製造與零售高度垂直整合。其目的並非為了節省成本，而是為了換取無可匹敵的「速度」與對市場的快速回應能力。"},
  {title:"內部誘因的喪失",desc:"市場上的獨立供應商若做不好會倒閉（高強度誘因）；但企業內部的供應部門若做不好，通常只會被要求改善或重組（低強度誘因），容易滋生冗員。"}
],
m2_terms:[
  {front:"Vertical Integration\n垂直整合",back:"企業將價值鏈中原本由外部供應商或配銷商負責的相鄰活動，納入企業內部自行經營的策略。"},
  {front:"Asset Specificity\n資產專屬性",back:"一項資產若轉用於其他用途或其他使用者，其價值將大幅降低的程度。是產生套牢風險的根源。"},
  {front:"Hold-up Problem\n套牢問題",back:"交易一方在投入專屬性資產後，因沉沒成本無法收回，而在後續談判中遭到另一方機會主義行為剝削的風險。"}
],
m2_q:[
  {q:"何謂「向後整合」(Backward Integration)？",opts:["企業收購其配銷商或零售店","企業將原本向外採購的零組件改為自行生產","企業開發全新產品線","企業退出目前的市場"],ans:1,exp:"向後整合是沿著價值鏈往上游（原物料、零組件）方向進行整合。"},
  {q:"「套牢問題」(Hold-up Problem) 產生的核心條件是什麼？",opts:["市場競爭過於激烈","政府法規限制","雙方進行了高度的「專屬性資產」(Asset Specificity) 投資","產品的價格太低"],ans:2,exp:"當投資的資產專屬於某特定交易且難以轉移用途時，投資方就容易被對方套牢與勒索。"},
  {q:"企業內部的部門通常比外部市場供應商缺乏效率，這主要是因為：",opts:["企業員工學歷較低","缺乏市場機制的「高強度誘因」(High-powered incentives) 與競爭壓力","企業內部不重視品質","企業內部無法使用電腦"],ans:1,exp:"外部供應商面臨生存壓力（高強度誘因），而內部部門通常只面臨行政考核（低強度誘因），容易產生惰性。"},
  {q:"Zara 進行高度垂直整合的主要策略目的是什麼？",opts:["追求最低的生產成本","追求絕對的規模經濟","追求從設計到上架的極致速度與市場回應能力","為了避稅"],ans:2,exp:"Zara 為了將設計到上架的時間壓縮至三週內，選擇犧牲部分製造成本，透過垂直整合換取無可匹敵的速度。"},
  {q:"「最適規模差異」(Differences in optimal scale) 如何阻礙垂直整合？",opts:["因為大企業無法管理小部門","上游活動所需的最小效率規模可能遠大於下游企業的內部需求量，導致內部生產成本過高","因為規模太大會被反托拉斯法制裁","因為規模小比較容易創新"],ans:1,exp:"例如汽車廠若自己生產螺絲，產量未達螺絲廠的規模經濟，其單位成本將遠高於向外採購。"},
  {q:"在技術快速變遷的產業中，高度垂直整合的企業會面臨什麼風險？",opts:["失去策略彈性，難以快速更換新技術或新供應商","產品品質一定會下降","會被課徵更多的稅","員工流失率會降低"],ans:0,exp:"垂直整合會將資金鎖死在既有技術的資產上；外包則讓企業能隨時轉向市場上擁有最新技術的供應商。"},
  {q:"為了獲得煉鐵與軋鋼「共地生產」的能源節約（技術經濟性），兩家工廠：",opts:["必須由同一家公司擁有（垂直整合）","只要實體位置比鄰而居即可，未必需要同一家公司擁有","必須位於不同國家","必須由政府擁有"],ans:1,exp:"技術經濟性只要求地理位置上的結合。只要能透過長期合約解決交易風險，兩家獨立公司也能共地生產。"},
  {q:"「風險複合」(Compounding of risk) 在垂直整合的價值鏈中意味著什麼？",opts:["一家公司會面臨所有競爭對手的攻擊","價值鏈上一個環節的問題（如罷工或缺料）會迅速蔓延，導致整條價值鏈停擺","投資股票的風險","新產品開發失敗的機率"],ans:1,exp:"垂直整合將上下游緊密綁定，缺乏外部緩衝，單點故障容易引發系統性崩潰。"}
],

m3_nav:"3. 垂直關係",m3_title:"垂直關係的替代方案",
m3_p1:"「做」還是「買」(Make or Buy) 並非非黑即白的二選一。在完全的市場現貨交易 (Spot Contracts) 與完全的內部垂直整合 (Vertical Integration) 之間，存在著豐富的垂直關係光譜 (Spectrum of Vertical Relationships)。",
m3_p2:"現貨合約 (Spot Contracts) 適用於標準化、無專屬性投資的商品，企業能享受充分的市場競爭與彈性，但無法提供穩定保證。長期合約 (Long-term Contracts) 則提供較高的穩定性並鼓勵一定程度的專屬性投資，但難以預見未來所有變數（合約不完全），可能引發重新談判的摩擦。",
m3_p3:"為克服合約的不完全性並建立信任，企業發展出「關係型契約」(Relational Contracts) 或稱供應商夥伴關係。如 Toyota 與其供應商的 Keiretsu（企業集團）模式，雙方雖是獨立實體，但透過長期信任、資訊共享與少量交叉持股，既享有市場的誘因，又獲得類似垂直整合的協調性。",
m3_p4:"加盟制 (Franchising) 是另一種混合模式，主要用於向前整合。加盟主提供品牌、SOP 與行銷（解決規模經濟與標準化），加盟店長投入自身資本並親自經營（解決連鎖店長缺乏高強度誘因與在地資訊的問題）。",
m3_cards:[
  {title:"垂直關係光譜",desc:"現貨交易 → 長期合約 → 供應商夥伴關係 → 加盟 → 合資企業 (Joint Ventures) → 完全垂直整合。企業可依據資產專屬性與不確定性選擇最適模式。"},
  {title:"Toyota 的供應商網路",desc:"不採取美式車廠早期的完全垂直整合，而是與一階供應商建立長期夥伴關係。供應商參與新車早期開發，享有高度自主權但對品質負連帶責任。"},
  {title:"加盟制的經濟學",desc:"解決代理問題的最佳實踐。如果直營，店長只是領薪水的員工（誘因低）；加盟店長是老闆（誘因高），因此會極力管控成本與提升服務。"},
  {title:"合資企業 (Joint Ventures)",desc:"當雙方需要共同投入高度專屬性資產，但又不願完全合併時的選擇。雙方共同出資設立新公司，共享風險與利潤。"}
],
m3_terms:[
  {front:"Spot Contracts\n現貨合約",back:"在公開市場上進行的單次或短期交易，不涉及長期的承諾或專屬性投資。"},
  {front:"Franchising\n加盟制",back:"品牌擁有者授權獨立經營者使用其商標與商業模式的合約安排。有效結合了規模經濟與地方經營誘因。"},
  {front:"Relational Contracts\n關係型契約",back:"基於長期信任、聲譽與互惠，而非僅依靠法律條文約束的非正式交易關係。"}
],
m3_q:[
  {q:"在「垂直關係光譜」中，哪一種模式最接近完全的外部市場交易？",opts:["合資企業 (Joint Ventures)","現貨合約 (Spot Contracts)","加盟制 (Franchising)","供應商夥伴關係"],ans:1,exp:"現貨合約是一次性的買賣，不涉及長期承諾，是市場交易的最極端形式。"},
  {q:"為什麼長期合約 (Long-term Contracts) 往往難以完美解決交易風險？",opts:["因為簽約的筆不夠好","因為合約本質上是「不完全的」(Incomplete)，無法預見未來所有的突發狀況與變數","因為政府禁止長期合約","因為長期合約不需要律師"],ans:1,exp:"人的有限理性與環境的不確定性，使得長期合約無法涵蓋所有未來可能，從而留下敲詐的空間。"},
  {q:"Toyota 的供應商網路 (Keiretsu) 模式有何優勢？",opts:["供應商完全不受 Toyota 控制","兼具市場競爭的誘因與類似垂直整合的高效協調與信任","所有供應商都屬於 Toyota 的全資子公司","完全依賴現貨市場競標"],ans:1,exp:"Toyota 透過關係型契約建立信任，供應商雖獨立（有競爭誘因），但緊密協調，是介於 Make 和 Buy 之間的絕佳模式。"},
  {q:"加盟制 (Franchising) 主要解決了企業向前擴張時的什麼問題？",opts:["技術研發能力不足","代理問題（直營店長缺乏高強度誘因）與擴張資本不足","品牌知名度太高","生產線產能過剩"],ans:1,exp:"加盟主讓店長自己出資當老闆，解決了直營店長偷懶的代理問題，同時利用他人資本快速擴張。"},
  {q:"在什麼情況下，企業最適合採用「現貨合約」來採購原物料？",opts:["該原物料是標準化商品，市場供應商眾多且無須專屬性投資","該原物料是高度客製化的關鍵零組件","該原物料只有一家供應商能提供","該原物料的價格極度不穩定"],ans:0,exp:"標準化商品沒有套牢風險，透過現貨市場競標能獲得最佳的價格與彈性。"},
  {q:"下列何者屬於「關係型契約」(Relational Contracts) 的基礎？",opts:["厚達數千頁的法律條文","律師的強制執行","雙方長期的信任、聲譽考量與互惠默契","政府的法規命令"],ans:2,exp:"關係型契約不依賴法院執行，而是依賴雙方為了維護長期合作利益與聲譽而自律。"},
  {q:"合資企業 (Joint Venture) 通常用於哪種情況？",opts:["購買辦公室文具","開發不需要任何特殊技術的產品","雙方需要共同投入專屬性資產並共享風險，但不願完全合併","解雇多餘的員工"],ans:2,exp:"當專案風險高、需要雙方技術且涉及專屬性投資時，合資是綁定雙方利益的折衷方案。"},
  {q:"相較於完全垂直整合，供應商夥伴關係（如長期合作）有何潛在劣勢？",opts:["缺乏法律約束，萬一信任破裂可能面臨關鍵技術外流或供貨中斷風險","內部行政成本太高","供應商完全沒有競爭壓力","會導致公司破產"],ans:0,exp:"夥伴關係依賴信任，一旦信任破裂或供應商被競爭對手挖角，企業將面臨巨大的營運風險。"}
],

m4_nav:"4. 近代趨勢",m4_title:"近代趨勢：解構與虛擬企業",
m4_p1:"過去的工業巨頭（如 1920 年代的 Ford 胭脂河廠）追求 100% 的垂直整合，從鐵礦到汽車組裝一手包辦。然而，近三十年來的趨勢是「垂直解構」(Vertical Disaggregation) 與外包 (Outsourcing) 的狂潮。",
m4_p2:"這一趨勢主要由兩個因素驅動：第一，網際網路與通訊科技的進步大幅降低了市場交易成本；第二，全球化競爭迫使企業必須將資源集中於其最具競爭力的「核心能力」(Core Competencies) 上，並將非核心活動交由外部的專業廠商處理。",
m4_p3:"半導體產業是垂直解構的完美案例。早期如 Intel 採取整合元件製造 (IDM) 模式，涵蓋設計到製造。後來演化出無晶圓廠設計公司 (Fabless，如 NVIDIA, Qualcomm) 與純晶圓代工廠 (Foundry，如台積電 TSMC) 的專業分工模式。TSMC 匯聚了全球的製造需求，達成了單一 IDM 廠無法企及的極致規模經濟與學習曲線。",
m4_p4:"解構的極致是「虛擬企業」(Virtual Corporation)。這類企業主要存在於網路與合約之中，自身只保留最核心的品牌或研發，其餘如製造、物流、客服全數外包。Apple 某種程度上就是一家虛擬製造商，將硬體生產完全交給 Foxconn 等代工廠，自身則專注於高附加價值的設計、軟體與生態系。",
m4_cards:[
  {title:"核心能力聚焦",desc:"企業將資源撤出不具競爭優勢的環節。例如 Nike 將全部的鞋類製造外包給亞洲工廠，自身僅專注於設計與品牌行銷。"},
  {title:"代工業的崛起",desc:"如 EMS (電子製造服務) 大廠 Foxconn 與 Flex，他們透過承接多家品牌的製造訂單，實現了超越單一品牌的龐大製造規模經濟。"},
  {title:"虛擬企業的風險",desc:"過度外包可能導致企業喪失「邊做邊學」(Learning-by-doing) 的機會，長期下來可能連創新與設計能力都流失給代工廠。"},
  {title:"模組化設計",desc:"產品設計的模組化 (Modularity) 是產業垂直解構的技術基礎。當零組件間的介面標準化後，各環節就能輕易交由不同專業廠商生產。"}
],
m4_terms:[
  {front:"Vertical Disaggregation\n垂直解構",back:"產業價值鏈由原本由單一企業垂直整合，演變為由多個專業化企業分工合作的過程。"},
  {front:"Outsourcing\n外包",back:"企業將原本內部執行的活動或流程，轉交由外部專業供應商負責的策略。"},
  {front:"Virtual Corporation\n虛擬企業",back:"企業本身幾乎不擁有實體生產資產，主要透過資訊網絡與合約協調外部合作夥伴來完成價值創造的組織形式。"}
],
m4_q:[
  {q:"近三十年來產業結構的普遍趨勢為何？",opts:["企業越來越傾向 100% 垂直整合","垂直解構與將非核心業務外包","政府全面接管所有產業","放棄科技發展"],ans:1,exp:"受惠於交易成本降低與專業化分工的需求，垂直解構與外包成為現代企業的主流趨勢。"},
  {q:"半導體產業中的「無晶圓廠」(Fabless) 模式是指什麼？",opts:["公司不設計晶片，只負責代工製造","公司只專注於晶片設計與銷售，將製造環節完全外包給代工廠","公司只生產不含矽的晶片","公司退出半導體市場"],ans:1,exp:"如 NVIDIA、Qualcomm，他們專注於核心的設計能力，將資本密集的製造交由台積電等 Foundry 負責。"},
  {q:"台積電 (TSMC) 模式之所以能成功，主要是因為它實現了哪種經濟效益？",opts:["匯聚全球設計公司的訂單，達成了單一 IDM 廠無法企及的規模經濟與經驗曲線","因為它不投資研發","因為它的員工最少","因為它自行設計並銷售晶片"],ans:0,exp:"純代工模式讓台積電不與客戶競爭，從而能吸納全球訂單，將昂貴的半導體設備產能利用率極大化。"},
  {q:"Nike 將所有運動鞋製造外包，自身專注於設計與行銷。這種策略背後的邏輯是？",opts:["製造太無聊了","將資源集中於附加價值最高、最具核心競爭力的品牌與研發活動","找不到工人","政府規定不能自己製造"],ans:1,exp:"這符合核心能力理論：將沒有差異化優勢且附加價值較低的活動外包給效率更高的專業代工廠。"},
  {q:"「虛擬企業」(Virtual Corporation) 的主要特徵是什麼？",opts:["所有員工都在虛擬實境中上班","公司沒有自己的品牌","企業極度依賴外部合約與夥伴網絡來完成價值創造，自身保留極少實體資產","公司完全沒有實體產品"],ans:2,exp:"虛擬企業透過強大的資訊系統協調供應鏈，自身猶如樂團指揮，將製造、物流等環節全交由外部執行。"},
  {q:"過度外包 (Over-outsourcing) 的一項長期隱憂是什麼？",opts:["導致公司稅務增加","可能導致企業喪失「從製造中學習」的機會，最終連核心設計與創新能力也被代工廠掏空","會導致辦公室太空曠","員工會太閒"],ans:1,exp:"許多學者警告，研發與製造往往難以完全分割。放棄製造可能導致企業逐漸失去對產品底層技術的敏銳度。"},
  {q:"什麼技術因素大幅推動了產業的垂直解構？",opts:["產品設計的「模組化」(Modularity) 與介面標準化","產品設計的「高度整合一體化」","人工手寫帳本","傳統的打字機"],ans:0,exp:"當產品（如 PC）被設計成標準介面的模組時，組裝廠就能輕易從市場採購各模組，無須自行垂直整合。"},
  {q:"驅動近年來外包狂潮的最重要外部環境因素是？",opts:["氣候變遷","網際網路與資通訊科技的大幅進步，顯著降低了市場交易成本","工會的崛起","石油價格上漲"],ans:1,exp:"IT 技術的進步解決了 Coase 提出的搜尋、協調與監督成本，使得市場機制的效率大幅超越企業內部的科層管理。"}
]
},

m0_nav:"0. Overview",
m0_title:"Corporate Strategy: Vertical Integration",
m0_intro:"Business Strategy focuses on how to compete; Corporate Strategy focuses on where to compete—defining the boundaries of the firm. This module explores why firms exist through Transaction Cost Economics (TCE), analyzes the benefits and costs of vertical integration, hold-up risks, and modern trends like outsourcing and the virtual corporation.",
m0_why:"Why Learn About Firm Boundaries & Vertical Integration?",
m0_why_desc:"The 'Make or Buy' decision is one of the most fundamental strategic choices. From Ford's early 100% vertical integration (owning rubber plantations) to Apple's virtual corporation model (outsourcing all manufacturing). The boundaries of a firm are not determined by technology, but by the tug-of-war between administrative coordination costs and market transaction costs.",
m0_modules:[
  {num:"01",title:"Firm Boundaries & Transaction Costs",desc:"Coase's discovery, Markets (invisible hand) vs Firms (visible hand), TCE"},
  {num:"02",title:"Benefits & Costs of Vertical Integration",desc:"Technical economies, Hold-up problem, Lack of incentives & loss of flexibility"},
  {num:"03",title:"Alternatives to Vertical Integration",desc:"The grey area: spot contracts, long-term contracts, franchising, alliances"},
  {num:"04",title:"Recent Trends: Disaggregation",desc:"Vertical disaggregation, specialization, the outsourcing wave & virtual firms"}
],

m1_nav:"1. Boundaries & TCE",m1_title:"Firm Boundaries & Transaction Costs",
m1_p1:"When discussing competitive advantage, we focus on Business Strategy. But when we zoom out to ask 'what activities should the firm participate in?', we enter Corporate Strategy. Corporate strategy determines the firm's scope: product scope (diversification), geographical scope (internationalization), and vertical scope (vertical integration).",
m1_p2:"\"If the pricing mechanism of the market coordinates resources perfectly, why do firms exist?\" — Ronald Coase (1937)",
m1_p3:"Nobel laureate Ronald Coase introduced Transaction Cost Economics (TCE). He pointed out that using the market mechanism is not free; finding suppliers, negotiating, drafting contracts, monitoring, and enforcing them all incur costs (Transaction Costs).",
m1_p4:"Firms, as organizations, are substitutes for the market mechanism. When the cost of transacting through the market (the 'invisible hand') is greater than the cost of establishing an administrative hierarchy to coordinate internally (the 'visible hand'), the firm will internalize the activity, thereby expanding its boundaries.",
m1_cards:[
  {title:"Market Transaction Costs",desc:"Hidden costs of buying from the market: search costs, negotiation costs, contract drafting, monitoring and enforcement costs, and the risks of incomplete contracts."},
  {title:"Firm Administrative Costs",desc:"Hidden costs of internalizing activities: establishing management hierarchies, inter-departmental coordination, bureaucratic sluggishness, and lack of high-powered market incentives."},
  {title:"Coase's Golden Rule",desc:"The boundary of the firm settles where the administrative cost of organizing the last transaction internally exactly equals the transaction cost of conducting the same transaction in the open market."},
  {title:"Impact of IT",desc:"The internet and B2B platforms have drastically reduced market search and transaction costs, leading to shrinking firm boundaries globally and the rise of outsourcing."}
],
m1_terms:[
  {front:"Corporate Strategy",back:"Strategy exploring 'where to compete,' determining the firm's product, geographical, and vertical boundaries. Distinct from business strategy ('how to compete')."},
  {front:"Transaction Costs",back:"Friction costs incurred when using the market price mechanism to conduct exchanges, including search, negotiation, contracting, and monitoring costs."},
  {front:"Administrative Costs",back:"Organizational and managerial costs incurred when coordinating economic activities internally through management hierarchies and command systems."}
],
m1_q:[
  {q:"What is the main difference between Corporate and Business Strategy?",opts:["Corporate focuses on where to compete; Business focuses on how to compete","Corporate is for single products; Business is for multi-products","Corporate is for middle managers; Business is for top managers","They are identical"],ans:0,exp:"Corporate strategy defines firm boundaries (Where to compete); Business strategy defines competitive advantage within a market (How to compete)."},
  {q:"What was Ronald Coase's main explanation for why firms exist?",opts:["To maximize profit","Because using the market mechanism incurs costs (Transaction Costs)","Government regulations require it","To create jobs"],ans:1,exp:"Coase noted that market transactions have friction costs. When internal administrative costs are lower than market transaction costs, firms exist and expand."},
  {q:"Which of the following is a 'Market Transaction Cost'?",opts:["Cost of HR department","Middle manager salaries","Cost of searching for suppliers and negotiating contracts","Internal meeting time"],ans:2,exp:"Searching, negotiating, contracting, and monitoring external suppliers represent market transaction costs."},
  {q:"How did the internet and e-commerce affect firm boundaries?",opts:["Expanded boundaries infinitely","Drastically lowered transaction costs, causing firm boundaries to shrink (more outsourcing)","No effect","Caused firms to disappear"],ans:1,exp:"Technology lowered the cost of finding and monitoring external suppliers, making market purchases more attractive than internal manufacturing, driving outsourcing."},
  {q:"Expanding firm boundaries (e.g., vertical integration) increases which type of cost?",opts:["Transaction costs","Administrative and bureaucratic costs","Raw material costs","Marketing costs"],ans:1,exp:"Internalizing activities requires new management hierarchies to coordinate, increasing overall administrative and bureaucratic costs."},
  {q:"What is the 'Coasian boundary rule' determining optimal firm size?",opts:["Marginal Transaction Cost = Marginal Administrative Cost","Total Revenue = Total Cost","Maximize market share","Maximize employee count"],ans:0,exp:"Optimal firm boundary is reached when the administrative cost of internalizing the marginal transaction equals the cost of doing it in the market."},
  {q:"Under what condition is a firm likely to 'Buy' (outsource) rather than 'Make'?",opts:["Transaction costs are extremely high","Highly competitive supplier market with low transaction costs","Requires highly secretive proprietary tech","Internal administrative costs are zero"],ans:1,exp:"When market competition is fierce and transaction costs are low, buying allows the firm to enjoy supplier scale economies and competitive pricing."},
  {q:"What do the 'invisible hand' and 'visible hand' represent respectively?",opts:["Government and Market","Market price mechanism and Internal corporate hierarchy","Employees and Managers","Shareholders and CEOs"],ans:1,exp:"Adam Smith's 'invisible hand' is the market mechanism; Alfred Chandler's 'visible hand' represents internal management directives."}
],

m2_nav:"2. Benefits & Costs",m2_title:"Benefits and Costs of Vertical Integration",
m2_p1:"Vertical Integration is when a firm internalizes adjacent stages of its value chain. Integrating toward raw materials is 'Backward Integration'; toward the final consumer is 'Forward Integration'. Firms vertically integrate to capture specific benefits but must bear corresponding costs.",
m2_p2:"One benefit is 'Technical Economies'. For example, in steelmaking, co-locating iron smelting and steel rolling saves the energy cost of reheating steel billets. However, technical economies only require 'co-location'; they do not strictly require ownership by a single firm.",
m2_p3:"The most critical driver of vertical integration is Oliver Williamson's 'Hold-up Problem'. When transacting parties invest in 'Transaction-specific assets', they become mutually dependent. With incomplete contracts, one party may opportunistically exploit the other's dependence (e.g., hiking prices). To avoid this transaction risk, firms acquire their partners, achieving vertical integration.",
m2_p4:"However, vertical integration carries massive costs: (1) Loss of 'High-powered incentives'—internal departments lack market survival pressure, leading to inefficiency; (2) Differences in optimal scale—e.g., an automaker's internal wiper production may fall far short of a standalone wiper plant's minimum efficient scale; (3) Loss of strategic flexibility—integrated firms struggle to switch suppliers rapidly when tech changes; (4) Compounding of risk—a strike at one stage halts the entire chain.",
m2_cards:[
  {title:"The Hold-up Problem",desc:"Occurs with asset specificity (e.g., a mold designed for one specific client, or a power plant built next to a specific mine). Once invested, the asset cannot be easily repurposed, leaving the investor vulnerable to extortion."},
  {title:"Differences in Optimal Scale",desc:"Federal Express needs delivery trucks but never manufactures them. The minimum efficient scale for truck manufacturing (hundreds of thousands annually) far exceeds FedEx's internal needs, making internal production cost-prohibitive."},
  {title:"Zara's Vertical Integration",desc:"Zara highly integrates design, partial manufacturing, and retail. The goal isn't saving manufacturing costs, but buying unmatched 'speed' and market responsiveness."},
  {title:"Loss of Internal Incentives",desc:"Independent market suppliers go bankrupt if they perform poorly (high-powered incentives); internal supply departments just get reorganized or warned (low-powered incentives), breeding inefficiency."}
],
m2_terms:[
  {front:"Vertical Integration",back:"A strategy where a firm incorporates adjacent value chain activities previously handled by external suppliers or distributors into its own operations."},
  {front:"Asset Specificity",back:"The degree to which an asset loses value if redeployed to alternative uses or users. The root cause of the hold-up risk."},
  {front:"Hold-up Problem",back:"The risk that one party, after making a transaction-specific investment, gets opportunistically exploited by the other party during renegotiations due to sunk costs."}
],
m2_q:[
  {q:"What is 'Backward Integration'?",opts:["Acquiring distributors or retail stores","Producing components internally that were previously purchased externally","Developing entirely new product lines","Exiting current markets"],ans:1,exp:"Backward integration moves upstream along the value chain toward raw materials and components."},
  {q:"What is the core condition for the 'Hold-up Problem'?",opts:["Intense market competition","Strict government regulations","High degree of 'Transaction-specific asset' investments by the parties","Product prices are too low"],ans:2,exp:"When assets are specifically tailored to a transaction and cannot be easily redeployed, the investing party is vulnerable to hold-up (extortion)."},
  {q:"Why are internal departments often less efficient than external suppliers?",opts:["Employees have lower education","Lack of market mechanism's 'high-powered incentives' and survival pressure","Internal neglect of quality","Inability to use computers"],ans:1,exp:"External suppliers face survival pressure (high-powered incentives), whereas internal units usually only face administrative reviews (low-powered incentives), breeding slack."},
  {q:"What is the primary strategic goal of Zara's high vertical integration?",opts:["Lowest production costs","Absolute economies of scale","Extreme speed from design to rack and rapid market response","Tax evasion"],ans:2,exp:"Zara sacrifices some manufacturing cost efficiency by integrating vertically to achieve unmatched speed (design to store in under 3 weeks)."},
  {q:"How do 'Differences in optimal scale' hinder vertical integration?",opts:["Large firms can't manage small departments","The minimum efficient scale upstream may vastly exceed downstream internal demand, making internal production too costly","Scale brings antitrust issues","Small scale is better for innovation"],ans:1,exp:"E.g., if an automaker makes its own screws, its volume won't reach a screw factory's economies of scale, resulting in higher unit costs than buying externally."},
  {q:"In fast-changing tech industries, highly integrated firms face what risk?",opts:["Loss of strategic flexibility to quickly switch to new tech or suppliers","Quality will inevitably drop","Higher taxes","Lower employee turnover"],ans:0,exp:"Vertical integration locks capital into existing tech assets; outsourcing allows firms to flexibly switch to market suppliers with the latest tech."},
  {q:"To gain the 'Technical Economies' (energy savings) of co-locating iron smelting and steel rolling, the two plants:",opts:["Must be owned by the same company (Vertical Integration)","Only need to be physically co-located; ownership can be separate","Must be in different countries","Must be government-owned"],ans:1,exp:"Technical economies only dictate physical location. Separate companies can co-locate if they use long-term contracts to manage transaction risks."},
  {q:"What does 'Compounding of risk' mean in a vertically integrated value chain?",opts:["Facing attacks from all competitors","A problem at one stage (e.g., strike/shortage) quickly ripples, halting the entire value chain","Stock market investment risk","New product failure rate"],ans:1,exp:"Vertical integration tightly couples upstream and downstream without external buffers; a single point of failure can trigger systemic collapse."}
],

m3_nav:"3. Vertical Relationships",m3_title:"Alternatives to Vertical Integration",
m3_p1:"'Make or Buy' is not a black-and-white binary choice. Between pure market Spot Contracts and complete Vertical Integration lies a rich Spectrum of Vertical Relationships.",
m3_p2:"Spot Contracts suit standardized goods with no specific investments; firms enjoy full market competition and flexibility but lack supply guarantees. Long-term Contracts provide stability and encourage some specific investments, but cannot foresee all future variables (Contract Incompleteness), potentially leading to renegotiation friction.",
m3_p3:"To overcome incomplete contracts and build trust, firms developed 'Relational Contracts' or Vendor Partnerships. Toyota's 'Keiretsu' model is a prime example: suppliers remain independent entities, but long-term trust, info sharing, and minority cross-holdings provide coordination similar to vertical integration while retaining market incentives.",
m3_p4:"Franchising is a hybrid model primarily for forward integration. The franchisor provides the brand, SOPs, and marketing (solving scale economies and standardization), while the franchisee invests capital and manages personally (solving the agency problem of low incentives and local info asymmetry in corporate-owned stores).",
m3_cards:[
  {title:"Spectrum of Vertical Relationships",desc:"Spot Transactions → Long-term Contracts → Vendor Partnerships → Franchising → Joint Ventures → Full Vertical Integration. Choice depends on asset specificity and uncertainty."},
  {title:"Toyota's Supplier Network",desc:"Avoided early American automakers' full integration. Built long-term partnerships with Tier 1 suppliers. Suppliers join early product development, enjoying autonomy but sharing quality accountability."},
  {title:"Economics of Franchising",desc:"A best practice for agency problems. A corporate store manager is just a salaried employee (low incentives); a franchisee is the boss (high incentives), thus fiercely controlling costs and service."},
  {title:"Joint Ventures (JVs)",desc:"Chosen when both parties must commit highly specific assets but wish to avoid full merger. They co-fund a new entity, sharing risks and profits."}
],
m3_terms:[
  {front:"Spot Contracts",back:"Single or short-term transactions in the open market involving no long-term commitments or specific investments."},
  {front:"Franchising",back:"A contractual arrangement where a brand owner licenses its trademark and business model to independent operators. Combines scale economies with local entrepreneurial incentives."},
  {front:"Relational Contracts",back:"Informal transaction relationships based on long-term trust, reputation, and reciprocity rather than strict legal enforcement."}
],
m3_q:[
  {q:"In the 'Vertical Relationship Spectrum', which mode is closest to pure external market transactions?",opts:["Joint Ventures","Spot Contracts","Franchising","Vendor Partnerships"],ans:1,exp:"Spot contracts are one-off transactions with no long-term commitment, representing the extreme end of market exchange."},
  {q:"Why do Long-term Contracts often fail to perfectly resolve transaction risks?",opts:["Poor quality pens used for signing","Contracts are inherently 'incomplete' and cannot foresee all future variables and contingencies","Governments ban long-term contracts","They don't require lawyers"],ans:1,exp:"Bounded rationality and environmental uncertainty mean contracts cannot cover all future scenarios, leaving room for opportunism and hold-up."},
  {q:"What is the advantage of Toyota's supplier network (Keiretsu) model?",opts:["Suppliers are completely uncontrolled by Toyota","Combines market competition incentives with highly efficient, integration-like coordination and trust","All suppliers are wholly-owned subsidiaries","Relies purely on spot market bidding"],ans:1,exp:"Toyota builds trust via relational contracts. Suppliers remain independent (retaining incentives) but coordinate closely, a perfect middle ground between Make and Buy."},
  {q:"What problem does Franchising primarily solve during forward expansion?",opts:["Lack of R&D tech","Agency problems (low incentive of corporate store managers) and capital constraints for expansion","Brand awareness being too high","Excess production capacity"],ans:1,exp:"Franchising makes the manager the investing boss, solving the shirking (agency) problem of salaried managers, while utilizing franchisee capital to expand rapidly."},
  {q:"When is a firm best suited to use 'Spot Contracts' to procure materials?",opts:["The material is a standardized commodity with many suppliers and no specific investments needed","Highly customized key component","Only one supplier exists globally","Extreme price volatility"],ans:0,exp:"Standardized commodities pose no hold-up risk. Bidding in the spot market yields the best prices and flexibility."},
  {q:"Which of the following forms the basis of a 'Relational Contract'?",opts:["Thousands of pages of legal text","Lawyer enforcement","Long-term mutual trust, reputation concerns, and reciprocity","Government mandates"],ans:2,exp:"Relational contracts rely on self-enforcement through the desire to maintain profitable long-term relationships and reputation, not court enforcement."},
  {q:"When are Joint Ventures typically used?",opts:["Buying office stationery","Developing products needing no special tech","When both parties must commit specific assets and share risk, but refuse a full merger","To fire excess employees"],ans:2,exp:"When project risk is high, requires tech from both, and involves specific investments, a JV binds both parties' interests without full acquisition."},
  {q:"Compared to full vertical integration, what is a potential disadvantage of Vendor Partnerships (long-term cooperation)?",opts:["Lack of legal binding; if trust breaks, risks of IP leakage or supply disruption emerge","Excessive internal administrative costs","Suppliers have zero competitive pressure","Causes immediate bankruptcy"],ans:0,exp:"Partnerships rely heavily on trust. If trust erodes or a supplier is poached by a rival, the firm faces massive operational risks."}
],

m4_nav:"4. Recent Trends",m4_title:"Recent Trends: Disaggregation & Virtual Corporations",
m4_p1:"Past industrial giants (like Ford's 1920s River Rouge plant) pursued 100% vertical integration, handling everything from iron ore to assembly. However, the trend over the last 30 years has been a frenzy of 'Vertical Disaggregation' and Outsourcing.",
m4_p2:"This trend is driven by two factors: First, the internet and ICT advancements drastically lowered market transaction costs; Second, globalization forced firms to focus resources on their most competitive 'Core Competencies', outsourcing non-core activities to external specialists.",
m4_p3:"The semiconductor industry is a perfect example of vertical disaggregation. Early Intel used the Integrated Device Manufacturer (IDM) model (design to fab). This evolved into specialized Fabless design firms (NVIDIA, Qualcomm) and pure-play Foundries (TSMC). TSMC aggregates global manufacturing demand, achieving extreme scale economies and learning curves impossible for a single IDM.",
m4_p4:"The extreme of disaggregation is the 'Virtual Corporation'. These firms exist primarily in networks and contracts, retaining only core branding or R&D, while outsourcing manufacturing, logistics, and customer service entirely. Apple is essentially a virtual manufacturer, delegating hardware production to Foxconn while focusing on high-value design, software, and ecosystems.",
m4_cards:[
  {title:"Focus on Core Competencies",desc:"Firms divest from stages where they lack competitive advantage. Nike outsources all footwear manufacturing to Asian factories, focusing solely on design and brand marketing."},
  {title:"Rise of Contract Manufacturers",desc:"EMS (Electronics Manufacturing Services) giants like Foxconn and Flex accept orders from multiple brands, achieving massive manufacturing scale economies beyond the reach of any single brand."},
  {title:"Risks of the Virtual Firm",desc:"Over-outsourcing can cause firms to lose 'learning-by-doing' opportunities, eventually bleeding core innovation and design capabilities to their contract manufacturers over the long term."},
  {title:"Modular Design",desc:"Product modularity is the technical foundation of industry disaggregation. When component interfaces are standardized, different stages can easily be handled by different specialized firms."}
],
m4_terms:[
  {front:"Vertical Disaggregation",back:"The process where an industry value chain, originally integrated within single firms, evolves into specialized firms cooperating across stages."},
  {front:"Outsourcing",back:"The strategic practice of contracting out activities or processes previously performed internally to specialized external suppliers."},
  {front:"Virtual Corporation",back:"An organizational form owning almost no physical production assets, creating value primarily by coordinating external partners via information networks and contracts."}
],
m4_q:[
  {q:"What has been the prevalent trend in industry structure over the past 30 years?",opts:["Firms leaning toward 100% vertical integration","Vertical disaggregation and outsourcing non-core businesses","Total government takeover of industries","Abandoning technology"],ans:1,exp:"Driven by lowered transaction costs and the need for specialization, disaggregation and outsourcing have become dominant trends."},
  {q:"What does the 'Fabless' model in semiconductors refer to?",opts:["Firms that don't design chips, only manufacture them","Firms focusing solely on chip design/sales, outsourcing all manufacturing to foundries","Firms producing silicon-free chips","Firms exiting the semiconductor market"],ans:1,exp:"E.g., NVIDIA and Qualcomm focus on core design, outsourcing capital-intensive manufacturing to foundries like TSMC."},
  {q:"TSMC's success is primarily due to achieving which economic benefit?",opts:["Aggregating global design orders to achieve scale economies and experience curves impossible for a single IDM","Because it invests nothing in R&D","Because it has the fewest employees","Because it designs and sells its own chips"],ans:0,exp:"The pure-play foundry model ensures TSMC doesn't compete with clients, allowing it to aggregate global orders and maximize expensive fab utilization."},
  {q:"Nike outsources all shoe manufacturing to focus on design/marketing. What is the logic behind this strategy?",opts:["Manufacturing is boring","Concentrating resources on the highest added-value, core competency activities (brand/R&D)","Cannot find workers","Governments ban internal manufacturing"],ans:1,exp:"This aligns with core competence theory: outsource lower-value activities lacking differentiation advantage to more efficient specialists."},
  {q:"What is the main characteristic of a 'Virtual Corporation'?",opts:["All employees work in virtual reality","The company has no brand","The firm relies heavily on external contracts and partner networks to create value, retaining minimal physical assets","The company has no physical products"],ans:2,exp:"Virtual corporations use powerful IT systems to orchestrate the supply chain like a conductor, outsourcing manufacturing and logistics entirely."},
  {q:"What is a long-term hidden risk of 'Over-outsourcing'?",opts:["Increased corporate taxes","Losing 'learning-by-doing' opportunities, eventually hollowing out core design and innovation capabilities to the contract manufacturer","The office gets too empty","Employees have too much free time"],ans:1,exp:"Many scholars warn that R&D and manufacturing are hard to sever. Abandoning manufacturing can cause firms to lose their edge in underlying product technologies."},
  {q:"What technological factor heavily facilitated vertical disaggregation?",opts:["'Modularity' and interface standardization in product design","Highly integrated, unibody product designs","Manual ledger accounting","Traditional typewriters"],ans:0,exp:"When products (like PCs) are designed as modules with standard interfaces, assembly firms can easily source modules from the market without vertical integration."},
  {q:"What was the most important external environmental driver of the recent outsourcing wave?",opts:["Climate change","Massive advancements in the internet and ICT, drastically lowering market transaction costs","Rise of labor unions","Rising oil prices"],ans:1,exp:"IT advancements solved Coase's search, coordination, and monitoring costs, making the market mechanism vastly more efficient than internal corporate hierarchies."}
]
}
};

        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5] text-sm leading-snug whitespace-pre-line">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
          <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p>
        </div>
      </div>
    </div>
  );
};

/* ═══════ MODULE QUIZ ═══════ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3 text-slate-800 dark:text-slate-200">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500 font-bold'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400 text-red-600' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5 font-bold text-[#004030] dark:text-[#D8C3A5]' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    } text-slate-700 dark:text-slate-300`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => { 
            setSubmitted(true); 
            const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; 
            onQuizSubmit(moduleId, c, quizIndices.length, questions.length); 
          }}
          disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
          {t.submit}
        </button>
      ) : (
        <div className="flex items-center gap-4">
          <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</p>
          <button onClick={() => { setSelected({}); setSubmitted(false); }}
            className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/10 transition-colors">
            {t.retry}
          </button>
        </div>
      )}
    </div>
  );
};

/* ═══════ LAB COMPONENTS (VERTICAL INTEGRATION SPECIFIC) ═══════ */

// 1. TCE Make or Buy Simulator
const TCELab = ({lang}) => {
  const [transCost, setTransCost] = useState(50); // Market Friction
  const [adminCost, setAdminCost] = useState(50); // Internal Bureaucracy
  
  const recommend = transCost > adminCost ? 
                    (lang==='zh'?'建議：內部化 (Make) - 垂直整合':'Recommend: Internalize (Make) - Vertical Integration') :
                    transCost < adminCost ? 
                    (lang==='zh'?'建議：外部採購 (Buy) - 外包':'Recommend: Market Exchange (Buy) - Outsource') :
                    (lang==='zh'?'建議：混合模式 (聯盟/合約)':'Recommend: Hybrid (Alliance/Contracts)');
  
  const color = transCost > adminCost ? 'text-[#004030] dark:text-[#D8C3A5]' : 
                transCost < adminCost ? 'text-blue-600 dark:text-blue-400' : 'text-yellow-600 dark:text-yellow-400';

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'交易成本經濟學 (TCE) 模擬器':'Transaction Cost Economics (TCE) Simulator'}</h4>
      <p className="text-xs text-slate-500 mb-4">{lang==='zh'?'調整市場與企業內部的摩擦成本，決定最適邊界。':'Adjust market and internal friction costs to determine optimal firm boundary.'}</p>
      
      <div className="space-y-4">
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span className="text-blue-600 dark:text-blue-400">{lang==='zh'?'市場交易成本 (搜尋/談判/風險)':'Market Transaction Costs'}</span>
            <span>{transCost}</span>
          </div>
          <input type="range" min="10" max="90" value={transCost} onChange={e=>setTransCost(+e.target.value)} className="w-full accent-blue-600"/>
        </div>
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span className="text-[#004030] dark:text-[#D8C3A5]">{lang==='zh'?'企業行政成本 (層級/協調/官僚)':'Firm Administrative Costs'}</span>
            <span>{adminCost}</span>
          </div>
          <input type="range" min="10" max="90" value={adminCost} onChange={e=>setAdminCost(+e.target.value)} className="w-full accent-[#004030]"/>
        </div>
      </div>
      
      <div className="mt-5 p-4 bg-slate-50 dark:bg-slate-900 rounded-lg text-center border border-slate-200 dark:border-slate-700">
        <div className={`text-base font-black ${color}`}>{recommend}</div>
        <div className="text-xs mt-2 text-slate-500">
          {transCost > adminCost ? (lang==='zh'?'市場摩擦過大，看得見的手較有效率':'Market friction is too high; the visible hand is more efficient.') : 
           transCost < adminCost ? (lang==='zh'?'組織過於臃腫，看不見的手較有效率':'Org is too bureaucratic; the invisible hand is more efficient.') : 
           (lang==='zh'?'達到 Coase 邊界均衡點':'Reached the Coasian boundary equilibrium.')}
        </div>
      </div>
    </div>
  );
};

// 2. Hold-up Risk Calculator
const HoldUpRiskLab = ({lang}) => {
  const [specificity, setSpecificity] = useState(50);
  const [uncertainty, setUncertainty] = useState(50);
  const riskScore = Math.round((specificity * 0.7) + (uncertainty * 0.3));
  
  let riskLevel, riskColor;
  if(riskScore >= 75) { riskLevel = lang==='zh'?'極高套牢風險 (建議垂直整合)':'Severe Hold-up Risk (Recommend VI)'; riskColor = 'bg-red-500'; }
  else if(riskScore >= 40) { riskLevel = lang==='zh'?'中等風險 (建議長期合約)':'Moderate Risk (Recommend Long-term Contracts)'; riskColor = 'bg-yellow-500'; }
  else { riskLevel = lang==='zh'?'低風險 (建議現貨交易)':'Low Risk (Recommend Spot Contracts)'; riskColor = 'bg-green-500'; }

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'專屬性資產與套牢風險評估':'Asset Specificity & Hold-up Risk Assessor'}</h4>
      
      <div className="space-y-4 mb-4">
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>{lang==='zh'?'資產專屬性 (Asset Specificity)':'Asset Specificity'}</span><span>{specificity}%</span>
          </div>
          <input type="range" min="0" max="100" value={specificity} onChange={e=>setSpecificity(+e.target.value)} className="w-full accent-red-500"/>
        </div>
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>{lang==='zh'?'環境不確定性 (Uncertainty)':'Environmental Uncertainty'}</span><span>{uncertainty}%</span>
          </div>
          <input type="range" min="0" max="100" value={uncertainty} onChange={e=>setUncertainty(+e.target.value)} className="w-full accent-orange-500"/>
        </div>
      </div>
      
      <div className="pt-2">
        <div className="flex justify-between text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">
          <span>{lang==='zh'?'敲詐/套牢機率':'Probability of Hold-up'}</span><span>{riskScore}%</span>
        </div>
        <div className="bg-slate-100 dark:bg-slate-700 h-4 rounded-full overflow-hidden mb-2">
          <div className={`${riskColor} h-full transition-all`} style={{width:`${riskScore}%`}}></div>
        </div>
        <div className="text-center text-xs font-bold text-slate-700 dark:text-slate-300">{riskLevel}</div>
      </div>
    </div>
  );
};

// 3. Value Chain Integration Map
const IntegrationMapLab = ({lang}) => {
  const stages = lang==='zh' ? ['原物料','零組件','最終組裝','行銷與配銷','零售'] : ['Raw Mat.','Components','Assembly','Marketing','Retail'];
  const [activeStages, setActiveStages] = useState([false, false, true, true, false]); // Default: Assembly & Marketing

  const toggleStage = (index) => {
    const newStages = [...activeStages];
    newStages[index] = !newStages[index];
    setActiveStages(newStages);
  };

  const integrationScore = Math.round((activeStages.filter(Boolean).length / stages.length) * 100);
  const strategy = integrationScore === 100 ? (lang==='zh'?'完全垂直整合':'Full Vertical Integration') :
                   integrationScore === 0 ? (lang==='zh'?'完全虛擬企業':'Pure Virtual Corporation') :
                   activeStages[0] && !activeStages[4] ? (lang==='zh'?'高度向後整合':'High Backward Integration') :
                   !activeStages[0] && activeStages[4] ? (lang==='zh'?'高度向前整合':'High Forward Integration') :
                   (lang==='zh'?'選擇性垂直解構':'Selective Disaggregation');

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none md:col-span-2">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'價值鏈整合範圍自訂器':'Value Chain Integration Mapper'}</h4>
      <p className="text-xs text-slate-500 mb-4">{lang==='zh'?'點擊區塊以切換內部化 (Make) 或外包 (Buy)。':'Click blocks to toggle Internalize (Make) or Outsource (Buy).'}</p>
      
      <div className="flex flex-col sm:flex-row gap-2 mb-6">
        {stages.map((stage, i) => (
          <button key={i} onClick={() => toggleStage(i)}
            className={`flex-1 py-3 px-2 rounded-lg border-2 text-xs sm:text-sm font-bold transition-all flex flex-col items-center justify-center gap-1
              ${activeStages[i] ? 'bg-[#004030] border-[#004030] text-white dark:bg-[#D8C3A5] dark:border-[#D8C3A5] dark:text-[#004030]' : 'bg-slate-50 border-dashed border-slate-300 text-slate-400 dark:bg-slate-900 dark:border-slate-700'}`}>
            <span>{stage}</span>
            <span className="text-[10px] font-normal opacity-80">{activeStages[i] ? 'Make' : 'Buy'}</span>
          </button>
        ))}
      </div>

      <div className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-700">
        <div>
          <div className="text-xs text-slate-500">{lang==='zh'?'整合指數 (Integration Index)':'Integration Index'}</div>
          <div className="text-2xl font-black text-[#004030] dark:text-[#D8C3A5]">{integrationScore}%</div>
        </div>
        <div className="text-right">
          <div className="text-xs text-slate-500">{lang==='zh'?'企業型態診斷':'Firm Typology Diagnosis'}</div>
          <div className="text-sm font-bold text-slate-800 dark:text-slate-200">{strategy}</div>
        </div>
      </div>
    </div>
  );
};


/* ═══════ H2 COMPONENT ═══════ */
const H2 = ({ children, icon, number }) => (

    {icon && <span className="text-2xl">{icon}</span>}
    {number !== undefined && <span>{number}.</span>}

);

/* ═══════ APP ═══════ */
function App() {
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(false);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const [analytics, setAnalytics] = useState({
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0), quizAnswered: Array(TOTAL).fill(0)
  });
  const menuRef = useRef(null);
  const t = dict[lang];

  const modulesList = [
    {id:0,icon:"📋",num:"0",title:t.m0_nav,comp:<IconBookOpen size={16}/>},
    {id:1,icon:"📏",num:"1",title:t.m1_nav,comp:<IconMinimize size={16}/>},
    {id:2,icon:"⚖️",num:"2",title:t.m2_nav,comp:<IconTrendingUp size={16}/>},
    {id:3,icon:"🤝",num:"3",title:t.m3_nav,comp:<IconLink size={16}/>},
    {id:4,icon:"🏭",num:"4",title:t.m4_nav,comp:<IconGitMerge size={16}/>},
    {id:6,icon:"🔗",num:"6",title:t.m6_nav,comp:<IconGlobe size={16}/>},
    {id:7,icon:"🧪",num:"7",title:t.mlab_nav,comp:<IconZapLab size={16}/>},
    {id:8,icon:"📊",num:"8",title:lang==='zh'?'8. 學習分析':'8. Analytics',comp:<IconActivity size={16}/>}
  ];

  // Dark mode
  useEffect(()=>{ document.documentElement.classList.toggle('dark', isDark); },[isDark]);

  // Timer
  useEffect(()=>{
    const iv = setInterval(()=>{
      setAnalytics(a=>{ const nt=[...a.time]; nt[module]++; return {...a,time:nt}; });
    },1000);
    return ()=>clearInterval(iv);
  },[module]);

  // Click tracker
  const handleContentClick = () => {
    setAnalytics(a=>{ const nc=[...a.clicks]; nc[module]++; return {...a,clicks:nc}; });
  };

  // Quiz submit
  const handleQuizSubmit = (mid, correct, answeredCount, totalPool) => {
    setAnalytics(a=>{
      const qc=[...a.quizCorrect]; qc[mid]=correct;
      const qt=[...a.quizTotal]; qt[mid]=totalPool;
      const qa=[...a.quizAnswered]; qa[mid]=answeredCount;
      return {...a,quizCorrect:qc,quizTotal:qt,quizAnswered:qa};
    });
  };

  // Module switch
  const switchModule = (m) => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    setTtsState('idle');
    setModule(m);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  // Close menu on outside click
  useEffect(()=>{
    if(!menuOpen)return;
    const handler=(e)=>{ if(menuRef.current&&!menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[menuOpen]);

  // TTS
  const handleTTS = (action) => {
    if(!('speechSynthesis' in window))return;
    if(action==='stop'){window.speechSynthesis.cancel();setTtsState('idle');return;}
    if(action==='pause'){window.speechSynthesis.pause();setTtsState('paused');return;}
    if(action==='play'){
      if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return;}
      window.speechSynthesis.cancel();
      const sep = lang==='zh'?'。 ':'. ';
      let texts=[];
      if(module===0){
        texts=[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);
      } else if(module>=1&&module<=4){
        const mk=`m${module}`;
        texts=[t[`${mk}_title`],...[1,2,3,4].map(n=>t[`${mk}_p${n}`]).filter(Boolean),...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`),...(t[`${mk}_terms`]||[]).flatMap(tr=>[tr.front.replace('\n',' '),tr.back])].filter(Boolean);
      } else if(module===6){
        texts=[t.m6_title,t.m6_desc].filter(Boolean);
      } else if(module===7){
        texts=[t.mlab_title,t.mlab_desc].filter(Boolean);
      } else {
        texts=[t.analytics_title,t.analytics_desc].filter(Boolean);
      }
      const text=texts.join(sep);
      const utterance=new SpeechSynthesisUtterance(text);
      utterance.rate=0.95;
      const voices=window.speechSynthesis.getVoices();
      if(lang==='zh'){
        const v=voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if(v)utterance.voice=v; utterance.lang='zh-TW';
      } else {
        const v=voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if(v)utterance.voice=v; utterance.lang='en-GB';
      }
      utterance.onend=()=>setTtsState('idle');
      utterance.onerror=()=>setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  // CSV export with DOMPurify
  const exportCSV = () => {
    const safeGroup = window.DOMPurify.sanitize(studentInfo.group);
    const safeDept = window.DOMPurify.sanitize(studentInfo.dept);
    const safeId = window.DOMPurify.sanitize(studentInfo.id);
    const safeName = window.DOMPurify.sanitize(studentInfo.name);

    const BOM='\uFEFF';
    const header='Group,Dept,ID,Name,Module,TimeSpent(sec),Clicks,QuizCorrect,QuizAnswered,QuizTotal\n';
    let rows='';
    modulesList.forEach((m,i)=>{
      rows+=`${safeGroup},${safeDept},${safeId},${safeName},${m.title},${analytics.time[i]},${analytics.clicks[i]},${analytics.quizCorrect[i]},${analytics.quizAnswered[i]},${analytics.quizTotal[i]}\n`;
    });
    
    // 依據規範產生檔名：品牌_主標題_組別_學號_姓名_日期
    const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
    const safeTitle = t.title.replace(/ /g, '_');
    const filename = `${t.brand}_${safeTitle}_${safeGroup}_${safeId}_${safeName}_${dateStr}.csv`;

    const blob=new Blob([BOM+header+rows],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Render learning module
  const renderLearning = (num) => {
    const mk=`m${num}`;
    return (
      <div className="space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
        <H2 icon={modulesList.find(m=>m.id===num)?.icon} number={num}>{t[`${mk}_title`]}</H2>
        <p>{t[`${mk}_p1`]}</p>
        {t[`${mk}_p2`] && <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-base">{t[`${mk}_p2`]}</p>}
        {t[`${mk}_p3`] && <p>{t[`${mk}_p3`]}</p>}
        {t[`${mk}_p4`] && <p>{t[`${mk}_p4`]}</p>}
        {t[`${mk}_cards`] && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {t[`${mk}_cards`].map((c,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-2">{c.title}</h4>
                <p className="text-sm text-slate-600 dark:text-slate-400">{c.desc}</p>
              </div>
            ))}
          </div>
        )}
        <div className="mt-8 select-none">
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
          <div key={`terms-${module}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {t[`${mk}_terms`].map((term,i)=><FlipCard key={i} front={term.front} back={term.back} t={t}/>)}
          </div>
        </div>
        <ModuleQuiz key={`quiz-${module}`} questions={t[`${mk}_q`]} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit}/>
      </div>
    );
  };

  // Render Resources
  const renderResources = () => {
    const links = [
      {label:lang==='zh'?'Ronald Coase: 廠商的性質':'The Nature of the Firm (Coase, 1937)',url:'https://onlinelibrary.wiley.com/doi/full/10.1111/j.1468-0335.1937.tb00002.x',desc:lang==='zh'?'交易成本經濟學的開山之作，解釋為何企業會存在。':'The seminal paper on Transaction Cost Economics.'},
      {label:lang==='zh'?'Oliver Williamson: 交易成本經濟學':'Transaction-Cost Economics (Williamson, 1979)',url:'https://www.jstor.org/stable/725118',desc:lang==='zh'?'深入探討資產專屬性與套牢問題的經典文獻。':'Classic literature on asset specificity and hold-up problems.'},
      {label:lang==='zh'?'BCG 洞察：供應鏈重組':'BCG Insights: Supply Chain Resilience',url:'https://www.bcg.com/capabilities/operations/supply-chain',desc:lang==='zh'?'波士頓顧問集團關於全球供應鏈解構與重組的報告。':'BCG reports on global supply chain disaggregation.'}
    ];
    return (
      <div className="space-y-10 animate-fade-in select-none">
        <H2 icon="🔗" number={6}>{t.m6_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.m6_desc}</p>
        <div className="grid md:grid-cols-2 gap-3">{links.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
        <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'以上連結為外部資源，內容可能隨時變更。請自行確認資訊的時效性與正確性。':'Links are external resources that may change. Please verify timeliness and accuracy independently.'}</p>
        </div>
      </div>
    );
  };

  // Render Lab
  const renderLab = () => (
    <div className="space-y-8 animate-fade-in select-none">
      <H2 icon="🧪" number={7}>{t.mlab_title}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <div className="grid md:grid-cols-2 gap-6">
        <TCELab lang={lang}/>
        <HoldUpRiskLab lang={lang}/>
      </div>
      <IntegrationMapLab lang={lang}/>
    </div>
  );

  // Render Analytics
  const renderAnalytics = () => {
    const totalTime = analytics.time.reduce((s,v)=>s+v,0);
    const totalClicks = analytics.clicks.reduce((s,v)=>s+v,0);
    const totalCorrect = analytics.quizCorrect.reduce((s,v)=>s+v,0);
    const totalAnswered = analytics.quizAnswered.reduce((s,v)=>s+v,0);
    const overallAcc = totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0;
    const canExport = studentInfo.group&&studentInfo.dept&&studentInfo.id&&studentInfo.name;
    return (
      <div className="space-y-8 animate-fade-in select-none">
        <H2 icon="📊" number={8}>{t.analytics_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalTime}{t.analytics_sec}</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_total_time}</div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalClicks}{t.analytics_times}</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_total_clicks}</div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{overallAcc}%</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_overall_acc}</div>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-[#004030] text-white">
                <th className="px-3 py-2 text-left">{t.analytics_module}</th>
                <th className="px-3 py-2 text-center">{t.analytics_time}</th>
                <th className="px-3 py-2 text-center">{t.analytics_clicks}</th>
                <th className="px-3 py-2 text-center">{t.analytics_correct_ans_total}</th>
              </tr>
            </thead>
            <tbody>
              {modulesList.map((m,i)=>(
                <tr key={i} className="border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                  <td className="px-3 py-2 font-medium text-slate-700 dark:text-slate-300">{m.title}</td>
                  <td className="px-3 py-2 text-center">{analytics.time[i]}{t.analytics_sec}</td>
                  <td className="px-3 py-2 text-center">{analytics.clicks[i]}{t.analytics_times}</td>
                  <td className="px-3 py-2 text-center">{analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]} / ${analytics.quizAnswered[i]} / ${analytics.quizTotal[i]}`:t.analytics_no_data}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
          <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_group}</label>
              <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300">
                <option value="">--</option>
                {t.group_options.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_dept}</label>
              <input placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_id}</label>
              <input placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_name}</label>
              <input placeholder={t.analytics_name_ph} value={studentInfo.name} onChange={e=>setStudentInfo(s=>({...s,name:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
          </div>
          <div className="mt-4">
            <button onClick={exportCSV} disabled={!canExport} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-colors">
              {canExport?t.analytics_export_csv:t.analytics_fill_required}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // Render content
  const renderContent = () => {
    switch(module){
      case 0: return (
        <div className="space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
          <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white select-none">
            <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
            <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
            <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm select-none">
            <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
            <p className="text-base text-slate-600 dark:text-slate-400">{t.m0_why_desc}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 select-none">
            {t.m0_stats.map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
                <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
              </div>
            ))}
          </div>
          <div className="select-none">
            <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
            <div className="space-y-3">
              {t.m0_modules.map((m,i)=>(
                <button key={i} onClick={()=>switchModule(i+1)}
                  className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                  <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div>
                    <div className="text-sm text-slate-500 dark:text-slate-400">{m.desc}</div>
                  </div>
                  <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0 transition-colors"/>
                </button>
              ))}
            </div>
          </div>
          <div className="flex justify-end select-none">
            <button onClick={()=>switchModule(1)}
              className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white uppercase text-sm tracking-wider shadow-md rounded-lg transition-all">
              {t.m0_start}
            </button>
          </div>
        </div>
      );
      case 1: case 2: case 3: case 4: return renderLearning(module);
      case 6: return renderResources();
      case 7: return renderLab();
      case 8: return renderAnalytics();
      default: return null;
    }
  };

  return (
    <div className={`min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]`}>
      {/* HEADER */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30 select-none">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2">
            {/* Hamburger */}
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Toggle menu">
                {menuOpen ? <IconX size={20}/> : <IconMenu size={20}/>}
              </button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
                  </div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{switchModule(m.id);setMenuOpen(false);}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left
                        ${module===m.id
                          ?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold'
                          :'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            {/* Brand */}
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 text-white hover:text-[#D8C3A5] transition-colors">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="font-serif font-bold text-white text-sm hidden sm:inline truncate max-w-[200px]">{t.title}</span>
            </button>
          </div>
          {/* Controls */}
          <div className="flex items-center gap-1 sm:gap-2">
            <div className="flex items-center gap-1 mr-1 sm:mr-2">
              {ttsState==='idle' && <button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={16}/></button>}
              {ttsState==='playing' && <>
                <button onClick={()=>handleTTS('pause')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPause size={16}/></button>
                <button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>
              </>}
              {ttsState==='paused' && <>
                <button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPlay size={16}/></button>
                <button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>
              </>}
            </div>
            <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} className="px-2 py-1 text-xs sm:text-sm font-bold border border-[#D8C3A5]/50 rounded-lg hover:bg-white/10 transition-colors">
              {lang==='zh'?'EN':'中'}
            </button>
            <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">
              {isDark?<IconSun size={18}/>:<IconMoon size={18}/>}
            </button>
          </div>
        </div>
      </header>

      {/* BODY */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        {/* Sidebar */}
        <aside className="hidden md:block w-64 shrink-0 select-none">
          <div className="sticky top-20 space-y-1">
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>switchModule(m.id)}
                className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-left
                  ${module===m.id
                    ?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-sm'
                    :'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-[#004030] dark:hover:text-[#D8C3A5]'}`}>
                <span className={module===m.id?'text-[#D8C3A5]':'opacity-60'}>{m.icon}</span>
                <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 min-w-0" onClick={handleContentClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
          </div>
          {/* Bottom nav */}
          <div className="mt-6 flex justify-between items-center pt-6 border-t border-slate-300 dark:border-slate-700 select-none">
            <button onClick={()=>switchModule(Math.max(0,module-1))} disabled={module===0}
              className="px-4 sm:px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center transition-colors">
              ← {t.nav_prev}
            </button>
            <button onClick={()=>switchModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1}
              className="px-6 sm:px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center rounded-lg transition-all">
              {t.nav_next} <IconArrowRight size={16} className="ml-2"/>
            </button>
          </div>
        </main>
      </div>

      {/* FOOTER */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0 select-none">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span className="flex items-center gap-1">
            Architect:&nbsp;
            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo"
              target="_blank" rel="noopener noreferrer"
              className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">
              Prof. Shihmin Lo
            </a>
          </span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
            className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer">
            Top ↑
          </button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
